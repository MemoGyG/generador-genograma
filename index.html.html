<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador de Genogramas - Clase</title>
    
    <!-- Carga de Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Carga de React para la lógica -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Carga de Babel para traducir el código en tiempo real -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Configuración para evitar el error de react/jsx-runtime en navegadores -->
    <script>
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets['react'], { runtime: 'classic' }]
            ]
        });
    </script>
</head>
<body class="bg-gray-50 fixed inset-0 w-full h-full overflow-hidden">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel" data-presets="react-classic">
        const { useState, useMemo, useRef, useEffect } = React;

        // --- ÍCONOS SVG ---
        const IconoDescargar = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        );
        const IconoDeshacer = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg>
        );
        const IconoBasura = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        );

        // --- CONFIGURACIÓN BASE DEL LIENZO ---
        const SVG_WIDTH = 1200;
        const SVG_HEIGHT = 1000; 
        const NODE_SIZE = 40; 
        const Y_NIVEL_1 = 150; 
        const Y_NIVEL_2 = 350; 
        const Y_NIVEL_3 = 550; 
        const Y_NIVEL_4 = 750; 
        const X_CENTRO = SVG_WIDTH / 2;

        const generateId = () => Math.random().toString(36).substr(2, 9);

        function GenogramaApp() {
            const [appMode, setAppMode] = useState('estructura');
            const [activeGen, setActiveGen] = useState(1);
            const [selectedNodeForLink, setSelectedNodeForLink] = useState(null);
            
            const [relSourceId, setRelSourceId] = useState(null);
            const [relType, setRelType] = useState('unidos');

            const svgRef = useRef(null);
            const [history, setHistory] = useState([]);
            
            const [scale, setScale] = useState(1);
            const scaleRef = useRef(scale);
            const [position, setPosition] = useState({ x: 0, y: 0 });
            
            const containerRef = useRef(null);
            
            // Estados para Eventos de Táctil y Puntero
            const isDraggingCanvas = useRef(false);
            const dragStartCanvas = useRef({ x: 0, y: 0 });
            const [livePositions, setLivePositions] = useState({});
            const dragNodeState = useRef({ id: null, startX: 0, startY: 0, mouseX: 0, mouseY: 0, moved: false, allowClick: false });

            // Ref actualizado para el zoom
            useEffect(() => { scaleRef.current = scale; }, [scale]);

            const [genData, setGenData] = useState({
                paterno: { abuelo: { id: generateId(), vivo: true, nombre: '' }, abuela: { id: generateId(), vivo: true, nombre: '' }, hijos: [] },
                materno: { abuelo: { id: generateId(), vivo: true, nombre: '' }, abuela: { id: generateId(), vivo: true, nombre: '' }, hijos: [] },
                vinculos: [], nivel3: [], vinculosNivel3: [], nivel4: [], relaciones: [], manualPositions: {},
                extConfig: {} 
            });

            const updateGenData = (updater) => {
                setGenData(prev => {
                setHistory(h => [...h, prev].slice(-50));
                return typeof updater === 'function' ? updater(prev) : updater;
                });
            };

            const handleUndo = () => {
                if (history.length === 0) return;
                const previousState = history[history.length - 1];
                setHistory(prev => prev.slice(0, -1));
                setGenData(previousState);
            };

            const updateAbuelo = (lado, rol, campo, valor) => updateGenData(prev => ({ ...prev, [lado]: { ...prev[lado], [rol]: { ...prev[lado][rol], [campo]: valor } } }));
            const updateHijosCount = (lado, count) => updateGenData(prev => {
                const num = parseInt(count) || 0;
                let newHijos = [...prev[lado].hijos];
                if (num > newHijos.length) for (let i = newHijos.length; i < num; i++) newHijos.push({ id: generateId(), tipo: 'hombre', vivo: true, birthYear: '', nombre: '' });
                else if (num < newHijos.length) newHijos = newHijos.slice(0, num);
                return { ...prev, [lado]: { ...prev[lado], hijos: newHijos } };
            });
            const updateHijo = (lado, index, campo, valor) => updateGenData(prev => {
                const newHijos = [...prev[lado].hijos];
                newHijos[index] = { ...newHijos[index], [campo]: valor };
                return { ...prev, [lado]: { ...prev[lado], hijos: newHijos } };
            });

            const handleNodeClick = (nodeId) => {
                if (appMode === 'relacion') {
                    if (!relSourceId) setRelSourceId(nodeId);
                    else {
                        if (relSourceId !== nodeId) updateGenData(prev => ({ ...prev, relaciones: [...(prev.relaciones || []), { id: generateId(), source: relSourceId, target: nodeId, type: relType }] }));
                        setRelSourceId(null);
                    }
                    return;
                }
                setSelectedNodeForLink(prev => prev === nodeId ? null : nodeId);
                if (genData.paterno.hijos.some(h => h.id === nodeId) || genData.materno.hijos.some(h => h.id === nodeId)) setActiveGen(2);
                if (genData.nivel3.some(h => h.id === nodeId)) setActiveGen(3);
            };

            const createLink = (targetId, type) => {
                if (!selectedNodeForLink || !targetId) return;
                const isNivel2 = genData.paterno.hijos.some(h => h.id === selectedNodeForLink) || genData.materno.hijos.some(h => h.id === selectedNodeForLink);
                const isNivel3 = genData.nivel3.some(h => h.id === selectedNodeForLink);
                updateGenData(prev => {
                if (isNivel2) return { ...prev, vinculos: [...prev.vinculos, { id: generateId(), source: selectedNodeForLink, target: targetId, type: type }] };
                else if (isNivel3) return { ...prev, vinculosNivel3: [...prev.vinculosNivel3, { id: generateId(), source: selectedNodeForLink, target: targetId, type: type }] };
                return prev;
                });
                setSelectedNodeForLink(null);
            };

            const removeRelacion = (relId) => updateGenData(prev => ({ ...prev, relaciones: prev.relaciones.filter(r => r.id !== relId) }));
            const addHijoNivel3 = (vinculoId) => updateGenData(prev => ({ ...prev, nivel3: [...prev.nivel3, { id: generateId(), vinculoId: vinculoId, tipo: 'hombre', vivo: true, birthYear: '', nombre: '', esPI: false }] }));
            const updateHijoNivel3 = (index, campo, valor) => updateGenData(prev => { const newNivel3 = [...prev.nivel3]; newNivel3[index] = { ...newNivel3[index], [campo]: valor }; return { ...prev, nivel3: newNivel3 }; });
            const addHijoNivel4 = (vinculoId) => updateGenData(prev => ({ ...prev, nivel4: [...prev.nivel4, { id: generateId(), vinculoId: vinculoId, tipo: 'hombre', vivo: true, birthYear: '', nombre: '' }] }));
            const updateHijoNivel4 = (index, campo, valor) => updateGenData(prev => { const newNivel4 = [...prev.nivel4]; newNivel4[index] = { ...newNivel4[index], [campo]: valor }; return { ...prev, nivel4: newNivel4 }; });

            const updateExtConfig = (vinculoId, campo, valor) => {
                updateGenData(prev => ({
                    ...prev,
                    extConfig: {
                        ...prev.extConfig,
                        [vinculoId]: {
                            ...(prev.extConfig[vinculoId] || {}),
                            [campo]: valor
                        }
                    }
                }));
            };

            // --- MOTOR DE CÁLCULO DE POSICIONES Y RUTAS ---
            const layout = useMemo(() => {
                const nodes = []; const paths = []; const linkCenters = {}; const linkCentersN3 = {}; const SIB_GAP = 100; 
                const mergedPositions = { ...(genData.manualPositions || {}), ...livePositions };

                const getFinalCoords = (nodeObj, defX, defY) => {
                    const manual = mergedPositions[nodeObj.id];
                    return { ...nodeObj, x: manual ? manual.x : defX, y: manual ? manual.y : defY };
                };
                const sortHijos = (hijos) => [...hijos].sort((a, b) => (parseInt(a.birthYear) || 9999) - (parseInt(b.birthYear) || 9999));

                const pX = X_CENTRO - 450; const mX = X_CENTRO + 450; const gapN1 = 80;
                const p_abuelo = getFinalCoords({ ...genData.paterno.abuelo, tipo: 'hombre', isNivel1: true }, pX - gapN1, Y_NIVEL_1);
                const p_abuela = getFinalCoords({ ...genData.paterno.abuela, tipo: 'mujer', isNivel1: true }, pX + gapN1, Y_NIVEL_1);
                const m_abuelo = getFinalCoords({ ...genData.materno.abuelo, tipo: 'hombre', isNivel1: true }, mX - gapN1, Y_NIVEL_1);
                const m_abuela = getFinalCoords({ ...genData.materno.abuela, tipo: 'mujer', isNivel1: true }, mX + gapN1, Y_NIVEL_1);
                nodes.push(p_abuelo, p_abuela, m_abuelo, m_abuela);

                const midP = { midX: (p_abuelo.x + p_abuela.x) / 2, midY: Math.max(p_abuelo.y, p_abuela.y) + NODE_SIZE / 2 + 25 };
                const midM = { midX: (m_abuelo.x + m_abuela.x) / 2, midY: Math.max(m_abuelo.y, m_abuela.y) + NODE_SIZE / 2 + 25 };

                const p_hijos = sortHijos(genData.paterno.hijos).map((h, i, arr) => getFinalCoords({ ...h, lado: 'paterno' }, midP.midX - Math.max(0, (arr.length - 1) * SIB_GAP)/2 + (i * SIB_GAP), Y_NIVEL_2));
                p_hijos.forEach(h => nodes.push(h));
                const m_hijos = sortHijos(genData.materno.hijos).map((h, i, arr) => getFinalCoords({ ...h, lado: 'materno' }, midM.midX - Math.max(0, (arr.length - 1) * SIB_GAP)/2 + (i * SIB_GAP), Y_NIVEL_2));
                m_hijos.forEach(h => nodes.push(h));

                genData.vinculos.forEach(v => {
                    const sourceNode = nodes.find(n => n.id === v.source);
                    let targetNode = nodes.find(n => n.id === v.target);
                    if (sourceNode) {
                        if (!targetNode && v.target === 'externo') {
                            const config = genData.extConfig[v.id] || {};
                            const defaultType = sourceNode.tipo === 'hombre' ? 'mujer' : 'hombre';
                            
                            targetNode = getFinalCoords({ 
                                id: `${v.id}-ext`, 
                                tipo: config.tipo || defaultType, 
                                vivo: true, 
                                dummy: true 
                            }, sourceNode.x + SIB_GAP, sourceNode.y);
                            nodes.push(targetNode);
                        }
                        if (targetNode) linkCenters[v.id] = { midX: (sourceNode.x + targetNode.x) / 2, midY: Math.max(sourceNode.y, targetNode.y) + NODE_SIZE / 2 + 25 };
                    }
                });

                const hijosN3ByVinculo = {};
                genData.nivel3.forEach(h => { if(!hijosN3ByVinculo[h.vinculoId]) hijosN3ByVinculo[h.vinculoId] = []; hijosN3ByVinculo[h.vinculoId].push(h); });
                Object.entries(hijosN3ByVinculo).forEach(([vId, hijosN3]) => {
                    const center = linkCenters[vId];
                    if (center) {
                        const sortedN3 = sortHijos(hijosN3);
                        const n3_nodes = sortedN3.map((h, i) => getFinalCoords({ ...h }, center.midX - Math.max(0, (sortedN3.length - 1) * SIB_GAP)/2 + (i * SIB_GAP), Y_NIVEL_3));
                        n3_nodes.forEach(h => nodes.push(h));
                    }
                });

                genData.vinculosNivel3.forEach(v => {
                    const sourceNode = nodes.find(n => n.id === v.source);
                    let targetNode = nodes.find(n => n.id === v.target);
                    if (sourceNode) {
                        if (!targetNode && v.target === 'externo') {
                            const config = genData.extConfig[v.id] || {};
                            const defaultType = sourceNode.tipo === 'hombre' ? 'mujer' : 'hombre';

                            targetNode = getFinalCoords({ 
                                id: `${v.id}-ext`, 
                                tipo: config.tipo || defaultType, 
                                vivo: true, 
                                dummy: true 
                            }, sourceNode.x + SIB_GAP, sourceNode.y);
                            nodes.push(targetNode);
                        }
                        if (targetNode) linkCentersN3[v.id] = { midX: (sourceNode.x + targetNode.x) / 2, midY: Math.max(sourceNode.y, targetNode.y) + NODE_SIZE / 2 + 25 };
                    }
                });

                const hijosN4ByVinculo = {};
                genData.nivel4.forEach(h => { if(!hijosN4ByVinculo[h.vinculoId]) hijosN4ByVinculo[h.vinculoId] = []; hijosN4ByVinculo[h.vinculoId].push(h); });
                Object.entries(hijosN4ByVinculo).forEach(([vId, hijosN4]) => {
                    const center = linkCentersN3[vId];
                    if (center) {
                        const sortedN4 = sortHijos(hijosN4);
                        const n4_nodes = sortedN4.map((h, i) => getFinalCoords({ ...h }, center.midX - Math.max(0, (sortedN4.length - 1) * SIB_GAP)/2 + (i * SIB_GAP), Y_NIVEL_4));
                        n4_nodes.forEach(h => nodes.push(h));
                    }
                });

                const addVinculoU = (n1, n2, type) => {
                    const dropY = Math.max(n1.y, n2.y) + NODE_SIZE / 2 + 25; 
                    paths.push({ d: `M ${n1.x} ${n1.y + NODE_SIZE / 2} L ${n1.x} ${dropY} L ${n2.x} ${dropY} L ${n2.x} ${n2.y + NODE_SIZE / 2}`, type: type, isVinculo: true, midX: (n1.x + n2.x) / 2, midY: dropY });
                };

                const addDescendenciaPaths = (parentMidX, parentMidY, childrenList, defaultLevelY) => {
                    if (!childrenList || childrenList.length === 0) return;
                    const sibY = defaultLevelY - 50; 
                    paths.push({ d: `M ${parentMidX} ${parentMidY} L ${parentMidX} ${sibY}`, type: 'descendencia', isVinculo: false });
                    if (childrenList.length === 1) paths.push({ d: `M ${parentMidX} ${sibY} L ${childrenList[0].x} ${childrenList[0].y - NODE_SIZE / 2}`, type: 'descendencia' });
                    else {
                        paths.push({ d: `M ${Math.min(Math.min(...childrenList.map(c => c.x)), parentMidX)} ${sibY} L ${Math.max(Math.max(...childrenList.map(c => c.x)), parentMidX)} ${sibY}`, type: 'descendencia' });
                        childrenList.forEach(child => paths.push({ d: `M ${child.x} ${sibY} L ${child.x} ${child.y - NODE_SIZE / 2}`, type: 'descendencia' }));
                    }
                };

                addVinculoU(p_abuelo, p_abuela, 'casados');
                addVinculoU(m_abuelo, m_abuela, 'casados');
                addDescendenciaPaths(midP.midX, midP.midY, p_hijos, Y_NIVEL_2);
                addDescendenciaPaths(midM.midX, midM.midY, m_hijos, Y_NIVEL_2);

                genData.vinculos.forEach(v => {
                    const sNode = nodes.find(n => n.id === v.source);
                    const tNode = nodes.find(n => n.id === v.target) || nodes.find(n => n.id === `${v.id}-ext`);
                    if (sNode && tNode) addVinculoU(sNode, tNode, v.type);
                });

                Object.entries(hijosN3ByVinculo).forEach(([vId, hijosN3]) => {
                    const center = linkCenters[vId];
                    if (center) addDescendenciaPaths(center.midX, center.midY, hijosN3.map(h => nodes.find(n => n.id === h.id)).filter(Boolean), Y_NIVEL_3);
                });

                genData.vinculosNivel3.forEach(v => {
                    const sNode = nodes.find(n => n.id === v.source);
                    const tNode = nodes.find(n => n.id === v.target) || nodes.find(n => n.id === `${v.id}-ext`);
                    if (sNode && tNode) addVinculoU(sNode, tNode, v.type);
                });

                Object.entries(hijosN4ByVinculo).forEach(([vId, hijosN4]) => {
                    const center = linkCentersN3[vId];
                    if (center) addDescendenciaPaths(center.midX, center.midY, hijosN4.map(h => nodes.find(n => n.id === h.id)).filter(Boolean), Y_NIVEL_4);
                });

                return { nodes, paths };
            }, [genData, livePositions]);

            const getPerpOffset = (x1, y1, x2, y2, offset) => {
                const angle = Math.atan2(y2 - y1, x2 - x1);
                return { x: -Math.sin(angle) * offset, y: Math.cos(angle) * offset };
            };

            const getZigZagPath = (x1, y1, x2, y2) => {
                const dx = x2 - x1; const dy = y2 - y1;
                const length = Math.sqrt(dx*dx + dy*dy);
                const angle = Math.atan2(dy, dx);
                let d = `M ${x1} ${y1}`;
                for(let i=1; i<Math.floor(length / 15); i++) {
                    const offset = (i % 2 === 0) ? 8 : -8;
                    d += ` L ${x1 + Math.cos(angle) * (i * 15) - Math.sin(angle) * offset} ${y1 + Math.sin(angle) * (i * 15) + Math.cos(angle) * offset}`;
                }
                return d + ` L ${x2} ${y2}`;
            };

            const renderRelaciones = (nodes) => {
                if (!genData.relaciones) return null;
                return genData.relaciones.map((rel, index) => {
                    const sNode = nodes.find(n => n.id === rel.source);
                    const tNode = nodes.find(n => n.id === rel.target);
                    if (!sNode || !tNode) return null;

                    const color = '#f97316'; 
                    const angle = Math.atan2(tNode.y - sNode.y, tNode.x - sNode.x);
                    const r = NODE_SIZE / 2 + 8;
                    const px1 = sNode.x + Math.cos(angle) * r; const py1 = sNode.y + Math.sin(angle) * r;
                    const px2 = tNode.x - Math.cos(angle) * r; const py2 = tNode.y - Math.sin(angle) * r;
                    const perp = getPerpOffset(px1, py1, px2, py2, 4);
                    const perpWide = getPerpOffset(px1, py1, px2, py2, 8);
                    let paths = [];

                    if (rel.type === 'unidos') {
                        paths.push(<path key={`r1-${index}`} d={`M ${px1+perp.x} ${py1+perp.y} L ${px2+perp.x} ${py2+perp.y}`} stroke={color} strokeWidth="2" fill="none" />);
                        paths.push(<path key={`r2-${index}`} d={`M ${px1-perp.x} ${py1-perp.y} L ${px2-perp.x} ${py2-perp.y}`} stroke={color} strokeWidth="2" fill="none" />);
                    } else if (rel.type === 'fusionados') {
                        paths.push(<path key={`r1-${index}`} d={`M ${px1} ${py1} L ${px2} ${py2}`} stroke={color} strokeWidth="2" fill="none" />);
                        paths.push(<path key={`r2-${index}`} d={`M ${px1+perpWide.x} ${py1+perpWide.y} L ${px2+perpWide.x} ${py2+perpWide.y}`} stroke={color} strokeWidth="2" fill="none" />);
                        paths.push(<path key={`r3-${index}`} d={`M ${px1-perpWide.x} ${py1-perpWide.y} L ${px2-perpWide.x} ${py2-perpWide.y}`} stroke={color} strokeWidth="2" fill="none" />);
                    } else if (rel.type === 'distantes') {
                        paths.push(<path key={`r1-${index}`} d={`M ${px1} ${py1} L ${px2} ${py2}`} stroke={color} strokeWidth="2" strokeDasharray="6,6" fill="none" />);
                    } else if (rel.type === 'apartados') {
                        paths.push(<path key={`r1-${index}`} d={`M ${px1} ${py1} L ${px2} ${py2}`} stroke={color} strokeWidth="2" fill="none" />);
                        const cut = getPerpOffset(px1, py1, px2, py2, 10);
                        paths.push(<path key={`r2-${index}`} d={`M ${(px1+px2)/2+cut.x} ${(py1+py2)/2+cut.y} L ${(px1+px2)/2-cut.x} ${(py1+py2)/2-cut.y}`} stroke={color} strokeWidth="2" fill="none" />);
                    } else if (rel.type === 'conflictivos' || rel.type === 'abuso') {
                        paths.push(<path key={`r1-${index}`} d={getZigZagPath(px1, py1, px2, py2)} stroke={color} strokeWidth="2" fill="none" />);
                        if (rel.type === 'abuso') {
                            const a1 = angle - Math.PI/6; const a2 = angle + Math.PI/6;
                            paths.push(<path key={`r2-${index}`} d={`M ${px2} ${py2} L ${px2 - Math.cos(a1)*12} ${py2 - Math.sin(a1)*12} M ${px2} ${py2} L ${px2 - Math.cos(a2)*12} ${py2 - Math.sin(a2)*12}`} stroke={color} strokeWidth="2" fill="none" />);
                        }
                    } else if (rel.type === 'fusionados_conflictivos') {
                        paths.push(<path key={`r1-${index}`} d={`M ${px1+perpWide.x} ${py1+perpWide.y} L ${px2+perpWide.x} ${py2+perpWide.y}`} stroke={color} strokeWidth="2" fill="none" />);
                        paths.push(<path key={`r2-${index}`} d={`M ${px1-perpWide.x} ${py1-perpWide.y} L ${px2-perpWide.x} ${py2-perpWide.y}`} stroke={color} strokeWidth="2" fill="none" />);
                        paths.push(<path key={`r3-${index}`} d={getZigZagPath(px1, py1, px2, py2)} stroke={color} strokeWidth="2" fill="none" />);
                    }
                    return <g key={rel.id}>{paths}</g>;
                });
            };

            const renderSymbol = (node) => {
                let color = '#1f2937';
                if (appMode === 'estructura' && selectedNodeForLink === node.id) color = '#3b82f6'; 
                else if (appMode === 'relacion' && relSourceId === node.id) color = '#f97316'; 

                const sw = node.esPI ? 4 : 2;
                const baseShape = () => {
                    switch (node.tipo) {
                        case 'hombre': return <rect x={-NODE_SIZE/2} y={-NODE_SIZE/2} width={NODE_SIZE} height={NODE_SIZE} fill="white" stroke={color} strokeWidth={sw} />;
                        case 'mujer': return <circle cx="0" cy="0" r={NODE_SIZE/2} fill="white" stroke={color} strokeWidth={sw} />;
                        case 'embarazo': return <polygon points={`0,${-NODE_SIZE/2} ${NODE_SIZE/2},${NODE_SIZE/2} ${-NODE_SIZE/2},${NODE_SIZE/2}`} fill="white" stroke={color} strokeWidth={sw} />;
                        case 'aborto_esp': return <circle cx="0" cy="0" r={10} fill={color} />;
                        case 'aborto_prov': return <path d={`M${-10},${-10} L${10},${10} M${10},${-10} L${-10},${10}`} stroke={color} strokeWidth="3" />;
                        case 'nacido_muerto': return <g><rect x={-NODE_SIZE/4} y={-NODE_SIZE/4} width={NODE_SIZE/2} height={NODE_SIZE/2} fill="white" stroke={color} strokeWidth="1" /><path d={`M${-NODE_SIZE/4},${-NODE_SIZE/4} L${NODE_SIZE/4},${NODE_SIZE/4} M${NODE_SIZE/4},${-NODE_SIZE/4} L${-NODE_SIZE/4},${NODE_SIZE/4}`} stroke={color} strokeWidth="1" /></g>;
                        default: return <rect x={-NODE_SIZE/2} y={-NODE_SIZE/2} width={NODE_SIZE} height={NODE_SIZE} fill="white" stroke={color} strokeWidth="2" />;
                    }
                };

                return (
                    <g>
                        {baseShape()}
                        {!node.vivo && (node.tipo === 'hombre' || node.tipo === 'mujer') && <path d={`M${-NODE_SIZE/2},${-NODE_SIZE/2} L${NODE_SIZE/2},${NODE_SIZE/2} M${NODE_SIZE/2},${-NODE_SIZE/2} L${-NODE_SIZE/2},${NODE_SIZE/2}`} stroke={color} strokeWidth="2" />}
                        {node.esPI && node.tipo === 'hombre' && <rect x={-(NODE_SIZE-8)/2} y={-(NODE_SIZE-8)/2} width={NODE_SIZE-8} height={NODE_SIZE-8} fill="none" stroke={color} strokeWidth="1" />}
                        {node.esPI && node.tipo === 'mujer' && <circle cx="0" cy="0" r={(NODE_SIZE-8)/2} fill="none" stroke={color} strokeWidth="1" />}
                        {appMode === 'relacion' && relSourceId === node.id && <circle cx="0" cy="0" r={NODE_SIZE/2 + 8} fill="none" stroke="#fbd38d" strokeWidth="4" opacity="0.6" />}
                    </g>
                );
            };

            const handleDownload = () => {
                const svg = svgRef.current;
                if (!svg) return;
                const svgData = new XMLSerializer().serializeToString(svg);
                const canvas = document.createElement("canvas");
                canvas.width = SVG_WIDTH; canvas.height = SVG_HEIGHT;
                const ctx = canvas.getContext("2d");
                const img = new Image();
                img.onload = () => {
                    ctx.fillStyle = "white"; ctx.fillRect(0, 0, SVG_WIDTH, SVG_HEIGHT);
                    ctx.drawImage(img, 0, 0);
                    const a = document.createElement("a"); a.download = "Mi_Genograma.jpg"; a.href = canvas.toDataURL("image/jpeg", 1.0); a.click();
                };
                img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgData)));
            };

            // --- SISTEMA INTELIGENTE DE EVENTOS DE PUNTERO (TÁCTIL Y MOUSE) ---
            const handleCanvasPointerDown = (e) => {
                e.currentTarget.setPointerCapture(e.pointerId);
                if (!dragNodeState.current.id) {
                    isDraggingCanvas.current = true;
                    dragStartCanvas.current = { x: e.clientX - position.x, y: e.clientY - position.y };
                }
            };

            const handleCanvasPointerMove = (e) => {
                if (dragNodeState.current.id) {
                    const dx = (e.clientX - dragNodeState.current.mouseX) / scale;
                    const dy = (e.clientY - dragNodeState.current.mouseY) / scale;
                    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragNodeState.current.moved = true;
                    
                    if (dragNodeState.current.moved) {
                        setLivePositions(prev => ({ ...prev, [dragNodeState.current.id]: { x: dragNodeState.current.startX + dx, y: dragNodeState.current.startY + dy } }));
                    }
                } else if (isDraggingCanvas.current) {
                    setPosition({ x: e.clientX - dragStartCanvas.current.x, y: e.clientY - dragStartCanvas.current.y });
                }
            };

            const handleCanvasPointerUp = (e) => {
                if (dragNodeState.current.id) {
                    const { id, moved, allowClick } = dragNodeState.current;
                    if (moved) {
                        setLivePositions(currentLive => {
                            if (currentLive[id]) updateGenData(prev => ({ ...prev, manualPositions: { ...(prev.manualPositions || {}), [id]: currentLive[id] } }));
                            return {};
                        });
                    } else if (allowClick) {
                        handleNodeClick(id);
                    }
                    dragNodeState.current = { id: null, startX: 0, startY: 0, mouseX: 0, mouseY: 0, moved: false, allowClick: false };
                }
                isDraggingCanvas.current = false;
                e.currentTarget.releasePointerCapture(e.pointerId);
            };

            // --- EVENTOS DE ZOOM PARA TÁCTIL (Pellizco) Y RUEDA DEL RATÓN ---
            useEffect(() => {
                const container = containerRef.current;
                let initialDist = 0;
                let initialScale = 1;

                const onTouchStart = (e) => {
                    if (e.touches.length === 2) {
                        e.preventDefault();
                        initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                        initialScale = scaleRef.current;
                    }
                };

                const onTouchMove = (e) => {
                    if (e.touches.length === 2) {
                        e.preventDefault();
                        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                        setScale(Math.min(Math.max(0.2, initialScale * (dist / initialDist)), 3));
                    }
                };

                const onWheel = (e) => { 
                    e.preventDefault(); 
                    setScale(prev => Math.min(Math.max(0.2, prev - e.deltaY * 0.001), 3)); 
                };

                if (container) {
                    container.addEventListener('touchstart', onTouchStart, { passive: false });
                    container.addEventListener('touchmove', onTouchMove, { passive: false });
                    container.addEventListener('wheel', onWheel, { passive: false });
                }
                return () => { 
                    if (container) {
                        container.removeEventListener('touchstart', onTouchStart);
                        container.removeEventListener('touchmove', onTouchMove);
                        container.removeEventListener('wheel', onWheel);
                    }
                };
            }, []);

            return (
                <div className="flex h-[100dvh] w-full font-sans text-gray-800 flex-col md:flex-row overflow-hidden">
                    
                    {/* LIENZO */}
                    <div 
                        ref={containerRef} 
                        className="relative bg-gray-200 overflow-hidden flex items-center justify-center touch-none h-[40vh] md:h-full md:flex-1 flex-none cursor-move" 
                        style={{ backgroundImage: 'radial-gradient(#9ca3af 1px, transparent 1px)', backgroundSize: '20px 20px' }} 
                        onPointerDown={handleCanvasPointerDown} 
                        onPointerMove={handleCanvasPointerMove} 
                        onPointerUp={handleCanvasPointerUp}
                        onPointerCancel={handleCanvasPointerUp}
                    >
                        <div className={`absolute top-4 left-4 bg-white/95 p-3 rounded shadow text-sm font-semibold z-10 border-l-4 hidden sm:block ${appMode === 'estructura' ? 'border-blue-500' : 'border-orange-500'}`} onPointerDown={e=>e.stopPropagation()}>
                            {appMode === 'estructura' ? 
                                <>💡 Toque para vincular.<br/>🖱️ Arrastra el fondo para mover la vista.<br/><strong>✨ Tip Pro: Puedes mover cualquier símbolo arrastrándolo directamente.</strong></> 
                                : <><span className="text-orange-700">❤️ Modo Relaciones</span><br/>Toque en origen, luego en destino.</>}
                        </div>
                        <div className="absolute bottom-4 left-4 bg-white/90 p-2 rounded shadow flex gap-2 z-10" onPointerDown={e=>e.stopPropagation()}>
                            <button onClick={() => setScale(s => Math.min(s + 0.2, 3))} className="w-10 h-10 bg-gray-100 hover:bg-gray-200 rounded font-bold shadow-sm text-xl">+</button>
                            <button onClick={() => setScale(s => Math.max(s - 0.2, 0.2))} className="w-10 h-10 bg-gray-100 hover:bg-gray-200 rounded font-bold shadow-sm text-xl">-</button>
                            <button onClick={() => { setScale(1); setPosition({x:0, y:0}); }} className="px-4 h-10 bg-gray-100 hover:bg-gray-200 rounded text-sm font-semibold shadow-sm">Centrar</button>
                        </div>
                        <div style={{ transform: `translate(${position.x}px, ${position.y}px) scale(${scale})`, transformOrigin: 'center' }}>
                            <svg ref={svgRef} width={SVG_WIDTH} height={SVG_HEIGHT} className="drop-shadow-2xl bg-white rounded-lg">
                                {renderRelaciones(layout.nodes)}
                                {layout.paths.map((p, i) => (
                                    <g key={`p-${i}`}>
                                        <path d={p.d} fill="none" stroke={(p.isVinculo && p.type !== 'casados' && p.type !== 'juntos') ? '#ef4444' : '#1f2937'} strokeWidth="2" strokeDasharray={p.type === 'juntos' ? "5,5" : ""} />
                                        {p.isVinculo && p.type === 'divorciados' && <g transform={`translate(${p.midX}, ${p.midY})`}><line x1="-5" y1="-10" x2="-5" y2="10" stroke="#ef4444" strokeWidth="2" /><line x1="5" y1="-10" x2="5" y2="10" stroke="#ef4444" strokeWidth="2" /></g>}
                                        {p.isVinculo && p.type === 'separados' && <g transform={`translate(${p.midX}, ${p.midY})`}><line x1="0" y1="-10" x2="0" y2="10" stroke="#ef4444" strokeWidth="2" /></g>}
                                    </g>
                                ))}
                                {layout.nodes.map(n => (
                                    <g key={n.id} transform={`translate(${n.x}, ${n.y})`} 
                                       onPointerDown={(e) => {
                                            e.stopPropagation();
                                            dragNodeState.current = {
                                                id: n.id, startX: n.x, startY: n.y, 
                                                mouseX: e.clientX, mouseY: e.clientY, moved: false, 
                                                allowClick: (!n.dummy || appMode === 'relacion') && (!n.isNivel1 || appMode === 'relacion')
                                            };
                                       }} 
                                       className="cursor-pointer hover:opacity-80 group">
                                        <rect x="-30" y="-30" width="60" height="60" fill="transparent" />
                                        {n.nombre && <text x="0" y={-(NODE_SIZE/2 + 10)} textAnchor="middle" fontSize="12" fontWeight="bold" fill="#4b5563" className="pointer-events-none">{n.nombre}</text>}
                                        {renderSymbol(n)}
                                        {n.birthYear && <text x="0" y={NODE_SIZE + 7} textAnchor="middle" fontSize="10" fill="#9ca3af" className="pointer-events-none">{n.birthYear}</text>}
                                    </g>
                                ))}
                            </svg>
                        </div>
                    </div>

                    {/* PANEL LATERAL RESPONSIVO */}
                    <div className="w-full md:w-[450px] bg-white shadow-xl flex flex-col border-t md:border-l border-gray-200 flex-1 min-h-0 relative z-20">
                        <div className="flex flex-col bg-gray-50 border-b border-gray-200 flex-none">
                            <div className="p-3 md:p-4 flex justify-between items-center bg-blue-900 text-white">
                                <h1 className="text-base md:text-lg font-bold">Generador de Genogramas</h1>
                                <div className="flex gap-2">
                                    <button onClick={handleUndo} disabled={history.length === 0} className={`p-1.5 md:p-2 rounded-full shadow-sm ${history.length === 0 ? 'bg-blue-800 text-blue-500' : 'bg-white text-blue-900'}`} title="Deshacer"><IconoDeshacer/></button>
                                    <button onClick={handleDownload} className="p-1.5 md:p-2 bg-white text-blue-900 rounded-full shadow-sm" title="Descargar JPG"><IconoDescargar/></button>
                                </div>
                            </div>
                            <div className="flex text-xs font-bold uppercase tracking-wide">
                                <button onClick={() => { setAppMode('estructura'); setRelSourceId(null); setSelectedNodeForLink(null); }} className={`flex-1 py-3 ${appMode === 'estructura' ? 'bg-blue-600 text-white' : 'text-gray-500 hover:bg-gray-200'}`}>🏢 Estructura</button>
                                <button onClick={() => { setAppMode('relacion'); setSelectedNodeForLink(null); }} className={`flex-1 py-3 ${appMode === 'relacion' ? 'bg-orange-500 text-white' : 'text-gray-500 hover:bg-gray-200'}`}>❤️ Relación</button>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto pb-48 min-h-0">
                            {appMode === 'estructura' && (
                                <div className="flex flex-col h-full">
                                    <div className="flex border-b border-gray-200 bg-gray-100 flex-none">
                                        {[1, 2, 3, 4].map(l => <button key={l} onClick={() => setActiveGen(l)} className={`flex-1 py-2 md:py-3 text-xs md:text-sm font-semibold ${activeGen === l ? 'bg-white text-blue-600 border-b-2 border-blue-600' : 'text-gray-500 hover:text-gray-700'}`}>Nivel {l}</button>)}
                                    </div>
                                    <div className="p-4 md:p-5 space-y-6">
                                        {activeGen === 1 && ['paterno', 'materno'].map(lado => (
                                            <div key={lado} className="border p-4 rounded-lg bg-gray-50">
                                                <h3 className="font-bold capitalize mb-4">Lado {lado}</h3>
                                                <div className="grid grid-cols-2 gap-2">
                                                    <input type="text" placeholder="Abuelo" value={genData[lado].abuelo.nombre} onChange={e => updateAbuelo(lado, 'abuelo', 'nombre', e.target.value)} className="col-span-2 border rounded p-2 text-base"/>
                                                    <select value={genData[lado].abuelo.vivo} onChange={e => updateAbuelo(lado, 'abuelo', 'vivo', e.target.value==='true')} className="col-span-2 border rounded p-2 text-base bg-white"><option value="true">Vivo</option><option value="false">Fallecido</option></select>
                                                    <input type="text" placeholder="Abuela" value={genData[lado].abuela.nombre} onChange={e => updateAbuelo(lado, 'abuela', 'nombre', e.target.value)} className="col-span-2 border rounded p-2 text-base mt-2"/>
                                                    <select value={genData[lado].abuela.vivo} onChange={e => updateAbuelo(lado, 'abuela', 'vivo', e.target.value==='true')} className="col-span-2 border rounded p-2 text-base bg-white"><option value="true">Viva</option><option value="false">Fallecida</option></select>
                                                </div>
                                            </div>
                                        ))}
                                        {activeGen === 2 && (
                                            <>
                                                {selectedNodeForLink && (genData.paterno.hijos.some(h=>h.id===selectedNodeForLink) || genData.materno.hijos.some(h=>h.id===selectedNodeForLink)) && (
                                                    <div className="bg-blue-50 p-4 border border-blue-200 rounded-lg space-y-2">
                                                        <select id="linkTypeN2" className="w-full border p-2 text-base bg-white rounded"><option value="casados">Casados</option><option value="juntos">Juntos</option><option value="separados">Separados</option><option value="divorciados">Divorciados</option></select>
                                                        <div className="flex gap-2">
                                                            <select id="linkTargetN2" className="flex-1 border p-2 text-base bg-white rounded" onChange={(e) => setSelectedNodeForLink(prev => prev)}>
                                                                <option value="">Selecciona destino...</option>
                                                                <option value="externo">-- Cónyuge Externo --</option>
                                                                <optgroup label="Lado Paterno">{genData.paterno.hijos.map((h,i)=><option key={h.id} value={h.id}>Hijo/a {i+1} Pat.</option>)}</optgroup>
                                                                <optgroup label="Lado Materno">{genData.materno.hijos.map((h,i)=><option key={h.id} value={h.id}>Hijo/a {i+1} Mat.</option>)}</optgroup>
                                                            </select>
                                                            <button onClick={() => createLink(document.getElementById('linkTargetN2').value, document.getElementById('linkTypeN2').value)} className="bg-blue-600 text-white px-4 py-2 rounded font-bold">Unir</button>
                                                        </div>
                                                    </div>
                                                )}
                                                
                                                {genData.vinculos.filter(v => v.target === 'externo').length > 0 && (
                                                    <div className="bg-purple-50 p-4 border border-purple-200 rounded-lg">
                                                        <h4 className="font-bold text-purple-800 text-sm mb-2">Configurar Cónyuges Externos</h4>
                                                        {genData.vinculos.filter(v => v.target === 'externo').map((v, idx) => {
                                                            const sNode = layout.nodes.find(n => n.id === v.source);
                                                            const nombreFuente = sNode ? (sNode.nombre || 'Alguien') : 'Alguien';
                                                            const config = genData.extConfig[v.id] || {};
                                                            const currentType = config.tipo || (sNode?.tipo === 'hombre' ? 'mujer' : 'hombre');
                                                            
                                                            return (
                                                                <div key={`extConf-${v.id}`} className="flex justify-between items-center bg-white p-2 rounded border mb-2 text-sm">
                                                                    <span className="text-gray-600 truncate max-w-[150px]">Pareja de {nombreFuente}</span>
                                                                    <select value={currentType} onChange={(e) => updateExtConfig(v.id, 'tipo', e.target.value)} className="border p-1 rounded bg-gray-50 text-xs">
                                                                        <option value="hombre">Es Hombre</option>
                                                                        <option value="mujer">Es Mujer</option>
                                                                    </select>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                )}

                                                {['paterno', 'materno'].map(lado => (
                                                    <div key={lado} className="border p-4 rounded-lg bg-gray-50">
                                                        <div className="flex justify-between items-center mb-4"><h3 className="font-bold capitalize">Hijos {lado}</h3><input type="number" value={genData[lado].hijos.length} onChange={e=>updateHijosCount(lado, e.target.value)} className="w-16 border p-2 text-center text-base"/></div>
                                                        {genData[lado].hijos.map((h, i) => (
                                                            <div key={h.id} className="bg-white p-3 border rounded mb-2 grid grid-cols-2 gap-2 text-sm">
                                                                <input type="text" placeholder="Nombre" value={h.nombre} onChange={e=>updateHijo(lado, i, 'nombre', e.target.value)} className="col-span-2 border p-2 text-base rounded" />
                                                                <select value={h.tipo} onChange={e=>updateHijo(lado, i, 'tipo', e.target.value)} className="border p-2 text-base bg-white rounded"><option value="hombre">Hombre</option><option value="mujer">Mujer</option><option value="embarazo">Embarazo</option><option value="aborto_esp">Aborto Esp.</option><option value="aborto_prov">Aborto Prov.</option><option value="nacido_muerto">Nacido Muerto</option></select>
                                                                <select value={h.vivo} onChange={e=>updateHijo(lado, i, 'vivo', e.target.value==='true')} className="border p-2 text-base bg-white rounded"><option value="true">Vivo</option><option value="false">Fallecido</option></select>
                                                                <input type="number" placeholder="Año Nac." value={h.birthYear} onChange={e=>updateHijo(lado, i, 'birthYear', e.target.value)} className="col-span-2 border p-2 text-base rounded" />
                                                            </div>
                                                        ))}
                                                    </div>
                                                ))}
                                            </>
                                        )}
                                        {activeGen === 3 && (
                                            <>
                                                {selectedNodeForLink && genData.nivel3.some(h=>h.id===selectedNodeForLink) && (
                                                    <div className="bg-blue-50 p-4 border border-blue-200 rounded-lg space-y-2">
                                                        <select id="linkTypeN3" className="w-full border p-2 text-base bg-white rounded"><option value="casados">Casados</option><option value="juntos">Juntos</option><option value="separados">Separados</option><option value="divorciados">Divorciados</option></select>
                                                        <div className="flex gap-2">
                                                            <select id="linkTargetN3" className="flex-1 border p-2 text-base bg-white rounded"><option value="externo">-- Cónyuge Externo --</option></select>
                                                            <button onClick={() => createLink(document.getElementById('linkTargetN3').value, document.getElementById('linkTypeN3').value)} className="bg-blue-600 text-white px-4 py-2 rounded font-bold">Unir</button>
                                                        </div>
                                                    </div>
                                                )}

                                                {genData.vinculosNivel3.filter(v => v.target === 'externo').length > 0 && (
                                                    <div className="bg-purple-50 p-4 border border-purple-200 rounded-lg">
                                                        <h4 className="font-bold text-purple-800 text-sm mb-2">Configurar Cónyuges Externos</h4>
                                                        {genData.vinculosNivel3.filter(v => v.target === 'externo').map((v, idx) => {
                                                            const sNode = layout.nodes.find(n => n.id === v.source);
                                                            const nombreFuente = sNode ? (sNode.nombre || 'Alguien') : 'Alguien';
                                                            const config = genData.extConfig[v.id] || {};
                                                            const currentType = config.tipo || (sNode?.tipo === 'hombre' ? 'mujer' : 'hombre');
                                                            
                                                            return (
                                                                <div key={`extConfN3-${v.id}`} className="flex justify-between items-center bg-white p-2 rounded border mb-2 text-sm">
                                                                    <span className="text-gray-600 truncate max-w-[150px]">Pareja de {nombreFuente}</span>
                                                                    <select value={currentType} onChange={(e) => updateExtConfig(v.id, 'tipo', e.target.value)} className="border p-1 rounded bg-gray-50 text-xs">
                                                                        <option value="hombre">Es Hombre</option>
                                                                        <option value="mujer">Es Mujer</option>
                                                                    </select>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                )}

                                                {genData.vinculos.map((v, vIndex) => (
                                                    <div key={v.id} className="border p-4 rounded-lg bg-gray-50">
                                                        <div className="flex justify-between items-center mb-4"><h3 className="font-bold text-sm md:text-base">Hijos Vínculo {vIndex+1}</h3><button onClick={()=>addHijoNivel3(v.id)} className="bg-green-100 text-green-700 px-3 py-1.5 rounded text-xs font-bold">+ Hijo</button></div>
                                                        {genData.nivel3.filter(h=>h.vinculoId===v.id).map(h => {
                                                            const idx = genData.nivel3.findIndex(hn=>hn.id===h.id);
                                                            return (
                                                                <div key={h.id} className="bg-white p-3 border rounded mb-2 grid grid-cols-2 gap-2 text-sm">
                                                                    <input type="text" placeholder="Nombre" value={h.nombre} onChange={e=>updateHijoNivel3(idx, 'nombre', e.target.value)} className="col-span-2 border p-2 text-base rounded" />
                                                                    <select value={h.tipo} onChange={e=>updateHijoNivel3(idx, 'tipo', e.target.value)} className="border p-2 text-base bg-white rounded"><option value="hombre">Hombre</option><option value="mujer">Mujer</option><option value="embarazo">Embarazo</option><option value="aborto_esp">Aborto Esp.</option><option value="aborto_prov">Aborto Prov.</option><option value="nacido_muerto">Nacido Muerto</option></select>
                                                                    <select value={h.vivo} onChange={e=>updateHijoNivel3(idx, 'vivo', e.target.value==='true')} className="border p-2 text-base bg-white rounded"><option value="true">Vivo</option><option value="false">Fallecido</option></select>
                                                                    <input type="number" placeholder="Año Nac." value={h.birthYear} onChange={e=>updateHijoNivel3(idx, 'birthYear', e.target.value)} className="col-span-2 border p-2 text-base rounded" />
                                                                    <label className="col-span-2 flex items-center gap-2 bg-blue-50 p-2 rounded"><input type="checkbox" className="w-5 h-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500" checked={h.esPI} onChange={e=>updateHijoNivel3(idx, 'esPI', e.target.checked)} /> <span className="text-sm font-bold text-blue-800">Paciente Identificado</span></label>
                                                                </div>
                                                            )
                                                        })}
                                                    </div>
                                                ))}
                                            </>
                                        )}
                                        {activeGen === 4 && (
                                            genData.vinculosNivel3.map((v, vIndex) => (
                                                <div key={v.id} className="border p-4 rounded-lg bg-gray-50">
                                                    <div className="flex justify-between items-center mb-4"><h3 className="font-bold text-sm md:text-base">Hijos Vínculo N3 ({vIndex+1})</h3><button onClick={()=>addHijoNivel4(v.id)} className="bg-green-100 text-green-700 px-3 py-1.5 rounded text-xs font-bold">+ Hijo</button></div>
                                                    {genData.nivel4.filter(h=>h.vinculoId===v.id).map(h => {
                                                        const idx = genData.nivel4.findIndex(hn=>hn.id===h.id);
                                                        return (
                                                            <div key={h.id} className="bg-white p-3 border rounded mb-2 grid grid-cols-2 gap-2 text-sm">
                                                                <input type="text" placeholder="Nombre" value={h.nombre} onChange={e=>updateHijoNivel4(idx, 'nombre', e.target.value)} className="col-span-2 border p-2 text-base rounded" />
                                                                <select value={h.tipo} onChange={e=>updateHijoNivel4(idx, 'tipo', e.target.value)} className="border p-2 text-base bg-white rounded"><option value="hombre">Hombre</option><option value="mujer">Mujer</option><option value="embarazo">Embarazo</option></select>
                                                                <select value={h.vivo} onChange={e=>updateHijoNivel4(idx, 'vivo', e.target.value==='true')} className="border p-2 text-base bg-white rounded"><option value="true">Vivo</option><option value="false">Fallecido</option></select>
                                                                <input type="number" placeholder="Año Nac." value={h.birthYear} onChange={e=>updateHijoNivel4(idx, 'birthYear', e.target.value)} className="col-span-2 border p-2 text-base rounded" />
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            )}
                            {appMode === 'relacion' && (
                                <div className="p-4 md:p-6 space-y-6">
                                    <div className="bg-orange-50 border border-orange-200 rounded-lg p-5">
                                        <h3 className="font-bold text-orange-900 mb-3">✏️ Nueva relación</h3>
                                        <label className="block text-xs font-bold text-orange-800 uppercase mb-1">1. Tipo:</label>
                                        <select value={relType} onChange={e=>setRelType(e.target.value)} className="w-full border p-2 mb-4 text-sm md:text-base font-semibold bg-white">
                                            <option value="unidos">Unidos</option><option value="fusionados">Fusionados</option>
                                            <option value="distantes">Distantes</option><option value="apartados">Separados</option>
                                            <option value="conflictivos">Conflictivos</option><option value="fusionados_conflictivos">Fusionados conflictivos</option>
                                            <option value="abuso">Abuso</option>
                                        </select>
                                        <p className="text-sm font-semibold text-orange-800">2. Clic en origen, luego en destino en el lienzo.</p>
                                    </div>
                                    <div>
                                        <h4 className="font-bold mb-3 border-b pb-2">Existentes</h4>
                                        {genData.relaciones.map(rel => (
                                            <div key={rel.id} className="flex justify-between items-center bg-gray-50 p-3 border rounded mb-2 text-sm">
                                                <span><strong className="text-orange-600 uppercase text-xs block">{rel.type.replace('_',' ')}</strong>{(layout.nodes.find(n=>n.id===rel.source)||{}).nombre||'Uno'} ↔ {(layout.nodes.find(n=>n.id===rel.target)||{}).nombre||'Otro'}</span>
                                                <button onClick={()=>removeRelacion(rel.id)} className="text-red-500 p-2"><IconoBasura/></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GenogramaApp />);
    </script>
</body>
</html>
